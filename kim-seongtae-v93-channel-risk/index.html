<style>
:root{--bg:#07101a;--panel:#0e1926;--panel2:#152436;--line:#4e3d24;--gold:#d7a84d;--gold2:#ffe19a;--text:#f7f2e8;--muted:#9eabbb;--good:#62d394;--bad:#ff7373;--blue:#69a9ff;--warn:#ffb15a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;color:var(--text);background:radial-gradient(circle at 50% -20%,#19314b 0,transparent 42%),var(--bg);font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;padding-bottom:84px}button,input,select{font:inherit}.wrap{max-width:1440px;margin:auto;padding:14px}.top{position:sticky;top:0;z-index:30;display:flex;gap:12px;justify-content:space-between;align-items:center;padding:12px 14px;margin:-14px -14px 14px;background:#07101aee;border-bottom:1px solid #2e4055;backdrop-filter:blur(12px)}.title{font-size:22px;font-weight:950;color:var(--gold2)}.version{padding:6px 10px;border:1px solid var(--gold);border-radius:999px;color:var(--gold2);font-size:12px;font-weight:900}.topStats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.chip{background:#111f2e;border:1px solid #33475d;border-radius:12px;padding:7px 10px;font-size:12px}.nav{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.nav button,.btn{border:1px solid #40546b;background:#122132;color:var(--text);border-radius:14px;padding:11px 14px;font-weight:850;cursor:pointer;transition:.18s}.nav button.active,.btn.gold{border-color:var(--gold);background:linear-gradient(135deg,#7d5624,#d7a84d);color:#160f06}.btn.good{background:#194c38;border-color:#46a878}.btn.bad{background:#52252a;border-color:#c35b65}.btn:active{transform:scale(.97)}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.card{background:linear-gradient(145deg,var(--panel),#09131f);border:1px solid #34475c;border-radius:22px;padding:16px;margin-bottom:14px}.card h2,.card h3{margin:0 0 10px}.sub{color:var(--muted);font-size:13px;line-height:1.55}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.metric{background:#101d2b;border:1px solid #304257;border-radius:16px;padding:12px}.metric span{display:block;color:var(--muted);font-size:12px}.metric b{display:block;font-size:20px;margin-top:5px}.brands{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.brand{position:relative;overflow:hidden;min-height:230px;border:1px solid #3e5167;border-radius:20px;background:#101d2b}.brand img{width:100%;height:115px;object-fit:cover;display:block;background:linear-gradient(135deg,#25394e,#101d2b)}.brandBody{padding:13px}.brandTitle{display:flex;justify-content:space-between;align-items:center;gap:8px}.brandTitle b{font-size:18px}.tag{display:inline-block;padding:4px 8px;border-radius:999px;background:#24384e;color:#b9d6ff;font-size:11px}.strategy{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px}.strategy button{border:1px solid #3b4e64;background:#0c1724;color:#c8d3df;border-radius:9px;padding:7px 3px;font-size:11px;cursor:pointer}.strategy button.on{background:#7d5624;color:#fff3d1;border-color:var(--gold)}.bar{height:8px;background:#26374a;border-radius:99px;overflow:hidden;margin-top:7px}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--good));width:50%}.contracts{display:grid;gap:9px}.contract{border:1px solid #34475c;border-radius:15px;padding:12px;background:#0d1825}.contractHead{display:flex;justify-content:space-between;gap:8px}.contractActions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.event{border:1px solid #4e3d24;border-radius:18px;padding:14px;background:linear-gradient(145deg,#1a2027,#101722);margin-bottom:10px}.event.hot{box-shadow:0 0 0 1px #8c642c inset}.eventChoices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.eventChoices button{border:1px solid #46586b;background:#101e2c;color:#fff;border-radius:12px;padding:10px;cursor:pointer}.log{max-height:220px;overflow:auto;font-size:12px;color:#c9d3dd}.log div{border-bottom:1px solid #27384a;padding:7px 0}.page{display:none}.page.active{display:block}.formrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.field{display:grid;gap:5px}.field label{font-size:12px;color:var(--muted)}.field input,.field select{width:100%;background:#091522;border:1px solid #3a4d62;color:#fff;border-radius:12px;padding:10px}.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);padding:11px 16px;background:#f5e5bd;color:#201406;border-radius:999px;font-weight:900;opacity:0;pointer-events:none;transition:.25s;z-index:100}.toast.show{opacity:1;transform:translate(-50%,-8px)}.burst{position:fixed;width:12px;height:12px;border-radius:50%;background:var(--gold2);pointer-events:none;z-index:99;animation:burst .55s ease-out forwards}@keyframes burst{to{transform:scale(9);opacity:0}}.mobileNav{display:none;position:fixed;bottom:0;left:0;right:0;background:#07101af5;border-top:1px solid #314357;padding:8px;grid-template-columns:repeat(5,1fr);z-index:40}.mobileNav button{background:transparent;color:#dce7f2;border:0;font-size:11px;padding:7px 2px}.dangerText{color:var(--bad)}.goodText{color:var(--good)}.warnText{color:var(--warn)}
@media(max-width:900px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.brands{grid-template-columns:1fr}.nav{display:none}.mobileNav{display:grid}.top{align-items:flex-start}.topStats{max-width:55%}.formrow{grid-template-columns:1fr}.eventChoices{grid-template-columns:1fr}.strategy{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
<header class="top"><div><div class="title">김성태전: 제국의 시대</div><div class="version">BUILD v9.3 · CHANNEL RISK</div></div><div class="topStats" id="topStats"></div></header>
<nav class="nav" id="nav"></nav>
<section class="page active" id="page-dashboard">
<div class="card"><h2>제국 현황</h2><p class="sub">이번 버전은 매출보다 현금회수와 채널 충돌을 관리해야 성장합니다.</p><div class="metrics" id="metrics"></div></div>
<div class="grid"><div><div class="card"><h2>브랜드 채널 전략</h2><div class="brands" id="brands"></div></div></div><div><div class="card"><h2>활성 사건</h2><div id="eventMini"></div></div><div class="card"><h3>최근 로그</h3><div class="log" id="log"></div></div></div></div>
</section>
<section class="page" id="page-contracts"><div class="card"><h2>계약·미수금 통제실</h2><p class="sub">선금·잔금·회수기간을 관리합니다. 계약이 많아도 현금이 부족하면 위기입니다.</p><div class="formrow"><div class="field"><label>신규 계약 브랜드</label><select id="contractBrand"></select></div><div class="field"><label>계약금액(만원)</label><input id="contractAmount" type="number" value="3000"></div><div class="field"><label>선금 비율(%)</label><input id="contractDeposit" type="number" value="40"></div></div><div style="margin-top:10px"><button class="btn gold" id="addContract">계약 등록</button></div></div><div class="card"><div class="contracts" id="contracts"></div></div></section>
<section class="page" id="page-events"><div class="card"><h2>신규 경영 사건</h2><div id="events"></div></div></section>
<section class="page" id="page-sim"><div class="card"><h2>월간 통합 시뮬레이션</h2><p class="sub">채널 전략, 브랜드력, 계약금 회수, 미수금 지연을 반영해 한 달을 계산합니다.</p><div class="formrow"><div class="field"><label>시장 변동성</label><input id="volatility" type="range" min="0" max="40" value="18"></div><div class="field"><label>광고비(만원)</label><input id="adSpend" type="number" value="500"></div><div class="field"><label>운영 집중도</label><select id="focus"><option value="growth">성장</option><option value="cash">현금회수</option><option value="brand">브랜드</option></select></div></div><div style="margin-top:12px"><button class="btn gold" id="runMonth">다음 달 시뮬레이션</button></div><div id="simResult" class="card" style="margin-top:12px"></div></div></section>
<section class="page" id="page-save"><div class="card"><h2>저장 복구 센터</h2><p class="sub">v9.2 데이터를 한 번만 가져오고, v9.3 저장 공간과 체크섬 백업 2개를 별도로 사용합니다.</p><div class="metrics" id="saveStatus"></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px"><button class="btn gold" id="saveNow">즉시 저장</button><button class="btn" id="exportBtn">JSON 내보내기</button><button class="btn" id="importBtn">JSON 가져오기</button><input type="file" id="importFile" accept="application/json" hidden><button class="btn bad" id="resetBtn">v9.3 초기화</button></div></div></section>
</div>
<nav class="mobileNav" id="mobileNav"></nav><div class="toast" id="toast"></div>
<script>
'use strict';
const VERSION='9.3';
const SAVE='kim_seongtae_empire_v93_save';
const BACK1='kim_seongtae_empire_v93_backup_1';
const BACK2='kim_seongtae_empire_v93_backup_2';
const OLD_KEYS=['kim_seongtae_empire_v92_save','kim_seongtae_empire_v91_save','kim_seongtae_empire_v90_save'];
const brandSeed=[
{id:'commov',name:'COMMOV',site:'https://commov-fragrance.baromina111.chatgpt.site/',image:'car-air.png',fallback:'linear-gradient(135deg,#0a0a0a,#5a412d)',brand:72,channel:'hybrid',conflict:20,monthly:1800,margin:38},
{id:'dnj',name:'DAVID & JONATHAN',site:'https://davidnjonathan.com/',image:'https://davidnjonathan.cafe24.com/web/upload/zero/main/main1.jpg',fallback:'linear-gradient(135deg,#36312e,#121212)',brand:69,channel:'dtc',conflict:15,monthly:1200,margin:44},
{id:'officek',name:'오피스K',site:'https://www.officek3.com/shop/',image:'',fallback:'linear-gradient(135deg,#26384e,#0b1420)',brand:61,channel:'b2b',conflict:10,monthly:2600,margin:18},
{id:'makamoye',name:'마카모예 브레드바',site:'#',image:'',fallback:'linear-gradient(135deg,#7a4d2a,#22150c)',brand:66,channel:'local',conflict:12,monthly:3000,margin:24}
];
const eventSeed=[
{id:'meta-reset',title:'COMMOV 메타 광고 학습 초기화',desc:'소재 변경으로 전환 학습이 초기화됐다. 매출을 지키거나 데이터를 다시 쌓아야 한다.',done:false,choices:[['기존 소재 유지',{cash:-120,brand:1,conflict:-2}],['신규 소재 A/B 테스트',{cash:-250,brand:4,conflict:3}],['광고 중단·CRM 전환',{cash:40,brand:-2,conflict:-4}]]},
{id:'dnj-settlement',title:'D&J 백화점 위탁정산 45일 지연',desc:'매출은 잡혔지만 현금이 들어오지 않는다. 거래조건을 재협상해야 한다.',done:false,choices:[['정산 대기',{cash:-180,brand:2,ar:900}],['3% 할인 조기정산',{cash:690,brand:0,ar:-700}],['다음 계약 선금 요구',{cash:0,brand:-1,conflict:6}]]},
{id:'office-audit',title:'오피스K 공공조달 단가 검증',desc:'학교 구매담당자가 비교견적과 납품이력 증빙을 요구한다.',done:false,choices:[['증빙 패키지 제출',{cash:-80,brand:5,conflict:-3}],['가격 5% 인하',{cash:-120,brand:2,conflict:-1}],['고마진 품목 제외',{cash:20,brand:-2,conflict:4}]]},
{id:'bakery-wholesale',title:'마카모예 편의점 20개점 납품 제안',desc:'생산량을 늘릴 기회지만 반품 조건이 강하다.',done:false,choices:[['10개점 테스트',{cash:-200,brand:3,ar:450}],['20개점 즉시',{cash:-500,brand:7,ar:1100}],['직영 판매 집중',{cash:80,brand:1,conflict:-2}]]}
];
function defaultState(){return{version:VERSION,month:1,cash:32000,debt:18000,revenue:8600,profit:1450,ar:2200,reputation:58,brands:JSON.parse(JSON.stringify(brandSeed)),contracts:[],events:JSON.parse(JSON.stringify(eventSeed)),logs:['v9.3 새 제국 데이터 생성'],migratedFrom:null,lastSaved:0}}
function checksum(x){const s=JSON.stringify(x);let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return (h>>>0).toString(16)}
function pack(data){return JSON.stringify({data,checksum:checksum(data)})}
function unpack(raw){const p=JSON.parse(raw);if(!p||!p.data||p.checksum!==checksum(p.data))throw Error('checksum');return p.data}
let state;
function migrate(){for(const k of OLD_KEYS){try{const raw=localStorage.getItem(k);if(!raw)continue;const old=JSON.parse(raw).data||JSON.parse(raw);const n=defaultState();['cash','debt','revenue','profit','ar','reputation','month'].forEach(x=>{if(Number.isFinite(old[x]))n[x]=old[x]});n.migratedFrom=k;n.logs.unshift(k+'에서 핵심 재무 수치 이전');return n}catch(e){}}return defaultState()}
function load(){try{const raw=localStorage.getItem(SAVE);if(raw)return unpack(raw)}catch(e){}for(const k of [BACK1,BACK2]){try{const raw=localStorage.getItem(k);if(raw){const d=unpack(raw);d.logs.unshift('백업 자동 복구: '+k);return d}}catch(e){}}return migrate()}
function save(){state.lastSaved=Date.now();try{const cur=localStorage.getItem(SAVE);const b1=localStorage.getItem(BACK1);if(b1)localStorage.setItem(BACK2,b1);if(cur)localStorage.setItem(BACK1,cur);localStorage.setItem(SAVE,pack(state));return true}catch(e){return false}}
state=load();state.version=VERSION;state.brands=state.brands&&state.brands.length?state.brands:JSON.parse(JSON.stringify(brandSeed));state.events=state.events&&state.events.length?state.events:JSON.parse(JSON.stringify(eventSeed));state.contracts=state.contracts||[];state.logs=state.logs||[];
const pages=['dashboard','contracts','events','sim','save'];
const navNames={dashboard:'제국',contracts:'계약',events:'사건',sim:'시뮬레이션',save:'저장'};
function money(v){return Math.round(v).toLocaleString()+'만원'}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1600)}
function burst(x,y){const e=document.createElement('i');e.className='burst';e.style.left=x+'px';e.style.top=y+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),600)}
document.addEventListener('click',e=>{if(e.target.closest('button'))burst(e.clientX,e.clientY)});
function go(p){pages.forEach(x=>document.getElementById('page-'+x).classList.toggle('active',x===p));document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===p));location.hash='#/'+p;render()}
function buildNav(){const html=pages.map(p=>'<button data-page="'+p+'">'+navNames[p]+'</button>').join('');document.getElementById('nav').innerHTML=html;document.getElementById('mobileNav').innerHTML=html;document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>go(b.dataset.page))}
function renderTop(){document.getElementById('topStats').innerHTML='<div class="chip">현금 <b>'+money(state.cash)+'</b></div><div class="chip">미수금 <b>'+money(state.ar)+'</b></div><div class="chip">월순익 <b>'+money(state.profit)+'</b></div>'}
function renderMetrics(){const avgConflict=Math.round(state.brands.reduce((a,b)=>a+b.conflict,0)/state.brands.length);document.getElementById('metrics').innerHTML=[['월',state.month],['매출',money(state.revenue)],['순익',money(state.profit)],['미수금',money(state.ar)],['채널충돌',avgConflict+'점']].map(x=>'<div class="metric"><span>'+x[0]+'</span><b>'+x[1]+'</b></div>').join('')}
function imgTag(b){return '<div style="height:115px;background:'+b.fallback+'"><img src="'+b.image+'" alt="'+b.name+'" onerror="this.style.display=\'none\'"></div>'}
function renderBrands(){document.getElementById('brands').innerHTML=state.brands.map(b=>'<article class="brand">'+imgTag(b)+'<div class="brandBody"><div class="brandTitle"><b>'+b.name+'</b><span class="tag">'+b.channel.toUpperCase()+'</span></div><div class="sub">브랜드력 '+b.brand+' · 충돌 '+b.conflict+' · 마진 '+b.margin+'%</div><div class="bar"><i style="width:'+b.brand+'%"></i></div><div class="strategy">'+[['dtc','DTC'],['b2b','B2B'],['hybrid','혼합'],['local','지역']].map(s=>'<button class="'+(b.channel===s[0]?'on':'')+'" data-brand="'+b.id+'" data-strategy="'+s[0]+'">'+s[1]+'</button>').join('')+'</div><button class="btn" data-site="'+b.site+'" style="margin-top:9px;width:100%">브랜드 사이트</button></div></article>').join('');document.querySelectorAll('[data-strategy]').forEach(btn=>btn.onclick=()=>setStrategy(btn.dataset.brand,btn.dataset.strategy));document.querySelectorAll('[data-site]').forEach(btn=>btn.onclick=()=>{if(btn.dataset.site==='#'){toast('매장·단체주문 랜딩 준비 중')}else window.open(btn.dataset.site,'_blank')})}
function setStrategy(id,s){const b=state.brands.find(x=>x.id===id);if(!b)return;const old=b.channel;b.channel=s;if(old!==s){b.conflict=Math.min(100,Math.max(0,b.conflict+(s==='hybrid'?4:-2)));b.brand=Math.min(100,b.brand+1);state.logs.unshift(b.name+' 채널 '+old+' → '+s+' 확정')}save();render();toast('채널 전략 반영')}
function renderContracts(){document.getElementById('contractBrand').innerHTML=state.brands.map(b=>'<option value="'+b.id+'">'+b.name+'</option>').join('');document.getElementById('contracts').innerHTML=state.contracts.length?state.contracts.map(c=>'<div class="contract"><div class="contractHead"><b>'+c.name+'</b><span class="tag">'+c.status+'</span></div><div class="sub">총액 '+money(c.amount)+' · 선금 '+c.deposit+'% · 잔금 '+money(c.balance)+' · 남은 '+c.days+'일</div><div class="contractActions"><button class="btn good" data-collect="'+c.id+'">미수금 회수</button><button class="btn" data-delay="'+c.id+'">7일 연장</button></div></div>').join(''):'<p class="sub">등록된 계약이 없습니다.</p>';document.querySelectorAll('[data-collect]').forEach(b=>b.onclick=()=>collect(b.dataset.collect));document.querySelectorAll('[data-delay]').forEach(b=>b.onclick=()=>delayContract(b.dataset.delay))}
function addContract(){const brand=state.brands.find(b=>b.id===document.getElementById('contractBrand').value);const amount=Number(document.getElementById('contractAmount').value)||0;const deposit=Math.max(0,Math.min(100,Number(document.getElementById('contractDeposit').value)||0));if(amount<=0)return toast('계약금액 확인');const upfront=Math.round(amount*deposit/100);const balance=amount-upfront;state.cash+=upfront;state.ar+=balance;state.contracts.unshift({id:'c'+Date.now(),brand:brand.id,name:brand.name+' 신규 계약',amount,deposit,balance,days:30,status:'진행'});state.logs.unshift(brand.name+' 계약 '+money(amount)+' 등록 · 선금 '+money(upfront));save();render();toast('계약 등록 완료')}
function collect(id){const c=state.contracts.find(x=>x.id===id);if(!c||c.balance<=0)return;const risk=state.brands.find(b=>b.id===c.brand).conflict;const rate=Math.max(.55,1-risk/180);const got=Math.round(c.balance*rate);state.cash+=got;state.ar-=c.balance;c.balance=0;c.status=got<c.amount*(1-c.deposit/100)?'일부회수':'완료';state.reputation+=got>0?1:0;state.logs.unshift(c.name+' 회수 '+money(got));save();render();toast('미수금 회수')}
function delayContract(id){const c=state.contracts.find(x=>x.id===id);if(!c)return;c.days+=7;state.reputation=Math.max(0,state.reputation-1);state.logs.unshift(c.name+' 회수 7일 연기');save();render();toast('회수일 연장')}
function renderEvents(){const active=state.events.filter(e=>!e.done);const html=active.map(e=>'<article class="event hot"><h3>'+e.title+'</h3><p class="sub">'+e.desc+'</p><div class="eventChoices">'+e.choices.map((c,i)=>'<button data-event="'+e.id+'" data-choice="'+i+'">'+c[0]+'</button>').join('')+'</div></article>').join('')||'<p class="sub">모든 사건을 처리했습니다.</p>';document.getElementById('events').innerHTML=html;document.getElementById('eventMini').innerHTML=active.slice(0,2).map(e=>'<div class="event"><b>'+e.title+'</b><p class="sub">'+e.desc+'</p></div>').join('')||'<p class="sub">활성 사건 없음</p>';document.querySelectorAll('[data-event]').forEach(b=>b.onclick=()=>resolveEvent(b.dataset.event,Number(b.dataset.choice)))}
function resolveEvent(id,idx){const e=state.events.find(x=>x.id===id);if(!e||e.done)return;const ef=e.choices[idx][1];state.cash+=ef.cash||0;state.ar=Math.max(0,state.ar+(ef.ar||0));state.reputation=Math.max(0,state.reputation+(ef.brand||0));state.brands.forEach(b=>{b.brand=Math.max(1,Math.min(100,b.brand+(ef.brand||0)/2));b.conflict=Math.max(0,Math.min(100,b.conflict+(ef.conflict||0)))});e.done=true;state.logs.unshift(e.title+' → '+e.choices[idx][0]);save();render();toast('사건 결과 반영')}
function simulate(){const vol=Number(document.getElementById('volatility').value)||0;const ad=Number(document.getElementById('adSpend').value)||0;const focus=document.getElementById('focus').value;let rev=0,profit=0;state.brands.forEach(b=>{const fit={dtc:1.05,b2b:1.08,hybrid:1.12,local:1.02}[b.channel]||1;const noise=1+(Math.random()-.5)*vol/100;const conflictPenalty=1-b.conflict/250;const focusBonus=focus==='growth'?1.09:focus==='brand'?1.04:1;const r=Math.max(0,b.monthly*fit*noise*conflictPenalty*focusBonus);rev+=r;profit+=r*b.margin/100;b.brand=Math.min(100,b.brand+(focus==='brand'?2:.4));b.conflict=Math.max(0,b.conflict-(focus==='cash'?2:0))});profit-=ad;let collected=0;state.contracts.forEach(c=>{c.days-=30;if(c.balance>0&&c.days<=0){const b=state.brands.find(x=>x.id===c.brand);const rate=Math.max(.45,1-b.conflict/160);const got=Math.round(c.balance*rate);collected+=got;state.ar-=c.balance;c.balance=0;c.status=got>0?'자동회수':'부실'}});if(focus==='cash'){const extra=Math.round(state.ar*.18);state.ar-=extra;collected+=extra}state.cash+=profit+collected;state.revenue=Math.round(rev);state.profit=Math.round(profit);state.month+=1;state.debt=Math.max(0,state.debt+Math.round(state.debt*.004));state.logs.unshift(state.month+'월 시뮬레이션 · 매출 '+money(rev)+' · 순익 '+money(profit)+' · 회수 '+money(collected));document.getElementById('simResult').innerHTML='<h3>시뮬레이션 완료</h3><div class="metrics">'+[['매출',money(rev)],['순익',money(profit)],['회수',money(collected)],['현금',money(state.cash)],['미수금',money(state.ar)]].map(x=>'<div class="metric"><span>'+x[0]+'</span><b>'+x[1]+'</b></div>').join('')+'</div>';save();render();toast('다음 달 완료')}
function renderLog(){document.getElementById('log').innerHTML=state.logs.slice(0,30).map(x=>'<div>'+x+'</div>').join('')}
function renderSave(){let main='없음',b1='없음',b2='없음';try{main=localStorage.getItem(SAVE)?'정상':'없음';b1=localStorage.getItem(BACK1)?'정상':'없음';b2=localStorage.getItem(BACK2)?'정상':'없음'}catch(e){main='차단'}document.getElementById('saveStatus').innerHTML=[['본 저장',main],['백업1',b1],['백업2',b2],['이전버전',state.migratedFrom||'없음'],['저장시각',state.lastSaved?new Date(state.lastSaved).toLocaleTimeString():'미저장']].map(x=>'<div class="metric"><span>'+x[0]+'</span><b>'+x[1]+'</b></div>').join('')}
function render(){renderTop();renderMetrics();renderBrands();renderContracts();renderEvents();renderLog();renderSave()}
function exportJSON(){const blob=new Blob([pack(state)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kim_seongtae_v93_save.json';a.click();URL.revokeObjectURL(a.href)}
function importJSON(file){const r=new FileReader();r.onload=()=>{try{state=unpack(r.result);state.version=VERSION;save();render();toast('복구 완료')}catch(e){toast('복구 실패: 파일 검증 오류')}};r.readAsText(file)}
buildNav();document.getElementById('addContract').onclick=addContract;document.getElementById('runMonth').onclick=simulate;document.getElementById('saveNow').onclick=()=>{save();render();toast('저장 완료')};document.getElementById('exportBtn').onclick=exportJSON;document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();document.getElementById('importFile').onchange=e=>e.target.files[0]&&importJSON(e.target.files[0]);document.getElementById('resetBtn').onclick=()=>{if(confirm('v9.3 데이터를 초기화할까요?')){localStorage.removeItem(SAVE);localStorage.removeItem(BACK1);localStorage.removeItem(BACK2);state=defaultState();save();render()}};const initial=(location.hash||'#/dashboard').replace('#/','');go(pages.includes(initial)?initial:'dashboard');save();render();
</script>
